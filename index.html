<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endemic - Memuat Halaman...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #fdfcf9;
            --accent-color: #d98263;
            --text-primary: #3a332a;
            --text-secondary: #6e6359;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--primary-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glow */
        .bg-glow {
            position: absolute;
            width: 80vw;
            height: 80vw;
            max-width: 800px;
            max-height: 800px;
            background: radial-gradient(circle, rgba(217, 130, 99, 0.15) 0%, transparent 60%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 4s infinite alternate ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        .content {
            z-index: 10;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s forwards ease-out 0.2s;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(30px); }
        }

        /* Logo Design */
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0px;
            color: var(--text-primary);
            text-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .logo-accent {
            color: var(--accent-color);
            font-style: italic;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 3.5rem;
        }

        /* Progress Bar Animation */
        .progress-container {
            width: 250px;
            height: 3px;
            background: rgba(110, 99, 89, 0.1);
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            animation: loadProgress 2.5s forwards cubic-bezier(0.7, 0, 0.3, 1);
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            40% { width: 65%; }
            100% { width: 100%; }
        }

        .status-text {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            animation: blink 2s infinite ease-in-out;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }

        /* Elegant Wipe Transition */
        .page-transition {
            position: fixed;
            bottom: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background-color: #e4ebdf; /* Matched from style.css background gradient edge */
            z-index: 9999;
            transform: translateY(100%);
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }
        
        body.navigating .page-transition {
            transform: translateY(0);
        }

        /* Mobile tweaks */
        @media (max-width: 768px) {
            .logo { font-size: 3.5rem; }
            .subtitle { font-size: 0.9rem; letter-spacing: 4px; }
            .progress-container { width: 180px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="content">
        <div class="logo">
            <span class="logo-accent">En</span>demic
        </div>
        <div class="subtitle">Bumi Pertiwi</div>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="status-text">MENYIAPKAN EKSPLORASI...</div>
    </div>

    <!-- The wipe element that triggers before redirect -->
    <div class="page-transition"></div>

    <script>
        // Start wipe animation when progress is full
        setTimeout(() => {
            document.body.classList.add('navigating');
            
            // Redirect smoothly exactly when wipe covers the screen
            setTimeout(() => {
                window.location.href = "Endemic/index.html";
            }, 600); // Wait for the transition wipe to reach top
            
        }, 2500); // 2.5 seconds artificial loading time
    </script>
</body>
</html>
